name: Laws

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Run Constitution (Lattice Laws)
      run: |
        cd tests/laws && npm init -y && npm install zod && cd ../..
        dotnet test tests/laws
    - name: Run Mutation Audit
      run: bash tests/laws/mutation_audit.sh
    - name: Run Integration Tests
      run: dotnet test tests/integration
